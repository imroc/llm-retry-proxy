# LLM Retry Proxy Configuration
#
# Copy this file to config.toml and adjust as needed.
# The proxy hot-reloads this file on changes — no restart needed.

[defaults]
# Maximum retry attempts (9999 = effectively unlimited)
max_retries = 9999

# Base delay for exponential backoff (milliseconds)
base_delay_ms = 1000

# Maximum delay cap for backoff (milliseconds)
max_delay_ms = 60000

# Total wait budget in milliseconds (0 = rely on client disconnect)
# Set to a positive value as a safety net for clients without timeouts.
max_total_wait_ms = 0

# Connection establishment timeout (seconds)
connect_timeout_secs = 30

# HTTP status codes that trigger a retry
retry_status_codes = [429, 500, 502, 503, 504, 408, 529]

# Route definitions: each route maps a URL path prefix to an upstream API.
# The first path segment of an incoming request URL is the route name.
# Example: /tkehub/v1/chat/completions → routes.tkehub.target + /v1/chat/completions

[routes.tkehub]
target = "http://tkehub.woa.com"

[routes.deepseek]
target = "https://api.deepseek.com"

[routes.tokenhub]
target = "https://tokenhub.tencentmaas.com"

# Protocol transform example: convert /v1/responses → /v1/chat/completions
# This enables AI tools like Codex (which use Responses API) to work with
# any Chat Completions compatible API provider.
#
# [routes.tkehub-codex]
# target = "http://tkehub.woa.com/v1"
# transform = "responses_to_chat"

# ── Model-level routing ────────────────────────────────────────────────────
#
# When the request body contains a `model` field, the proxy looks it up in
# the route's `models` map. If found, model-level config overrides the
# route-level config. If not found, the route-level config is used as-is.
#
# This enables a single route (provider) to manage multiple models from
# different upstreams — ideal for AI CLI tools like Codex that only allow
# model switching within the same provider.
#
# Model-level fields (all optional — only specified fields override):
#   target              — upstream API URL
#   transform           — "responses_to_chat" or "none" to explicitly disable
#   upstream_model      — rewrite the `model` field in the request body
#   rewrite_response_model — rewrite the `model` field in responses back to
#                            the client's original model name (default: false)
#   max_retries, base_delay_ms, max_delay_ms, max_total_wait_ms,
#   connect_timeout_secs, retry_status_codes
#
# Example: single route managing multiple providers for Codex
#
# [routes.tkehub]
# target = "http://tkehub.woa.com"
# transform = "responses_to_chat"  # route-level default for all models
#
# # GLM supports Responses API natively — direct passthrough, no transform
# [routes.tkehub.models."tke/glm-latest"]
# transform = "none"
#
# # DeepSeek goes to a different upstream, needs transform + model name mapping
# [routes.tkehub.models."tke/deepseek-flash-latest"]
# target = "https://tokenhub.tencentmaas.com"
# upstream_model = "deepseek-chat"
# rewrite_response_model = true
# max_delay_ms = 30000
